name = "sociologic-mcp-server"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[vars]
SOCIOLOGIC_API_URL = "https://www.sociologic.ai"

# OAuth KV namespace for token/grant storage
# Create via: npx wrangler kv namespace create OAUTH_KV
[[kv_namespaces]]
binding = "OAUTH_KV"
id = "283d6a4cf15c428c85a1a6dd7b52eca1"

# Production environment
[env.production]
name = "sociologic-mcp-server"
vars = { SOCIOLOGIC_API_URL = "https://www.sociologic.ai" }

[[env.production.kv_namespaces]]
binding = "OAUTH_KV"
id = "TODO_CREATE_PRODUCTION_KV_NAMESPACE"
